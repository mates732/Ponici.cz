<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle - warm ivory -->
  <circle cx="64" cy="64" r="62" fill="#F5EDE0" stroke="#5C4A32" stroke-width="2"/>

  <!-- Ears -->
  <!-- Left ear -->
  <path d="M38 38 C36 26, 44 18, 50 22 C54 24, 52 34, 48 40" fill="#F5EDE0" stroke="#5C4A32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M41 36 C40 28, 46 22, 50 25" fill="#E8C4B8" stroke="none"/>
  <!-- Right ear -->
  <path d="M90 38 C92 26, 84 18, 78 22 C74 24, 76 34, 80 40" fill="#F5EDE0" stroke="#5C4A32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M87 36 C88 28, 82 22, 78 25" fill="#E8C4B8" stroke="none"/>

  <!-- Head shape - round friendly face -->
  <path d="M36 52 C36 38, 48 28, 64 28 C80 28, 92 38, 92 52 C92 68, 88 80, 82 88 C76 96, 68 102, 64 104 C60 102, 52 96, 46 88 C40 80, 36 68, 36 52Z" fill="#F5EDE0" stroke="#5C4A32" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Forelock /鬃毛 - soft tuft between ears -->
  <path d="M52 32 C54 26, 60 24, 64 26 C68 24, 74 26, 76 32 C74 30, 68 28, 64 30 C60 28, 54 30, 52 32Z" fill="#E8DDD0" stroke="#5C4A32" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Eyes - big, friendly, curious -->
  <!-- Left eye -->
  <ellipse cx="50" cy="54" rx="6.5" ry="7" fill="#3D2E1C"/>
  <ellipse cx="48" cy="52" rx="2.2" ry="2.5" fill="white" opacity="0.85"/>
  <ellipse cx="52" cy="56" rx="1" ry="1.2" fill="white" opacity="0.4"/>
  <!-- Right eye -->
  <ellipse cx="78" cy="54" rx="6.5" ry="7" fill="#3D2E1C"/>
  <ellipse cx="76" cy="52" rx="2.2" ry="2.5" fill="white" opacity="0.85"/>
  <ellipse cx="80" cy="56" rx="1" ry="1.2" fill="white" opacity="0.4"/>

  <!-- Eyebrows - gentle soft lines -->
  <path d="M42 46 C44 44, 48 43, 54 44" stroke="#5C4A32" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M86 46 C84 44, 80 43, 74 44" stroke="#5C4A32" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Nose / snout bridge -->
  <path d="M58 62 C60 68, 62 74, 64 78 C66 74, 68 68, 70 62" stroke="#C4A88A" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Snout - big, soft, pink -->
  <ellipse cx="64" cy="84" rx="18" ry="14" fill="#E8C4B8" stroke="#5C4A32" stroke-width="2" stroke-linecap="round"/>

  <!-- Nostrils - simple friendly curves -->
  <path d="M56 84 C56 82, 58 80, 60 82" stroke="#5C4A32" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M72 84 C72 82, 70 80, 68 82" stroke="#5C4A32" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Mouth - gentle smile -->
  <path d="M58 90 C60 93, 64 94, 68 93 C70 92, 72 90, 70 89" stroke="#5C4A32" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Halter / ohlávka - muted sage green -->
  <path d="M42 50 C46 48, 52 46, 58 48" stroke="#6B8F71" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M86 50 C82 48, 76 46, 70 48" stroke="#6B8F71" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Noseband -->
  <path d="M48 72 C52 76, 58 78, 64 78 C70 78, 76 76, 80 72" stroke="#6B8F71" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Cheek straps -->
  <path d="M44 54 C44 60, 46 66, 48 72" stroke="#6B8F71" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M84 54 C84 60, 82 66, 80 72" stroke="#6B8F71" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Halter ring -->
  <circle cx="64" cy="78" r="3" fill="none" stroke="#6B8F71" stroke-width="2"/>

  <!-- Cheek spots - soft warm blush -->
  <circle cx="42" cy="62" r="5" fill="#E8C4B8" opacity="0.4"/>
  <circle cx="86" cy="62" r="5" fill="#E8C4B8" opacity="0.4"/>
</svg>
