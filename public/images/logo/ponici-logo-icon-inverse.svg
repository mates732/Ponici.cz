  <!-- Nostrils -->
  <path d="M56 84 C56 82, 58 80, 60 82" stroke="#F5EDE0" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M72 84 C72 82, 70 80, 68 82" stroke="#F5EDE0" stroke-width="1.8" stroke-linecap="round" fill="none"/>

