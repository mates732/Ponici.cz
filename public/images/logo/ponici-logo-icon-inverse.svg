  <path d="M86 50 C82 48, 76 46, 70 48" stroke="#F5EDE0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M48 72 C52 76, 58 78, 64 78 C70 78, 76 76, 80 72" stroke="#F5EDE0" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M44 54 C44 60, 46 66, 48 72" stroke="#F5EDE0" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M84 54 C84 60, 82 66, 80 72" stroke="#F5EDE0" stroke-width="2" stroke-linecap="round" fill="none"/>
  <circle cx="64" cy="78" r="3" fill="none" stroke="#F5EDE0" stroke-width="1.8"/>
